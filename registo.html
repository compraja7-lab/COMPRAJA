<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CompraJá - Autenticação Google</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <script>
        const SUPABASE_URL = "https://yngxpudkzjkicyokcdwq.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InluZ3hwdWRrempraWN5b2tjZHdxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNjU1NTQsImV4cCI6MjA5NDY0MTU1NH0.2UlNBw8F8HMgWeuyg9IygVFLAfYtW4Pf8j1jGH864gE";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    </script>

    <style>
        :root { 
            --primary-orange: #FF6600; 
            --bg-gray: #F8F9FA; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        /* Layout Responsivo: Ocupa o ecrã inteiro no telemóvel */
        body { 
            background: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            min-height: -webkit-fill-available;
            padding: 20px;
        }
        
        /* No telemóvel isto expande para 100%, no PC fica contido */
        .app-container { 
            width: 100%;
            max-width: 400px;
            height: 100%;
            display: flex; 
            flex-direction: column; 
            justify-content: space-between;
            align-items: center;
            padding: 40px 20px;
        }
        
        .brand { text-align: center; margin-top: auto; margin-bottom: 40px; }
        .brand h1 { color: var(--primary-orange); font-size: 36px; font-weight: 800; letter-spacing: -1px; }
        .brand p { font-size: 14px; color: #666; margin-top: 10px; line-height: 1.5; padding: 0 10px; }
        
        /* Zona onde a API do Google vai renderizar o botão nativo */
        .google-auth-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: auto;
            min-height: 50px;
        }
        
        .footer-notice {
            text-align: center;
            font-size: 11px;
            color: #999999;
            line-height: 1.5;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="brand">
            <h1>CompraJá</h1>
            <p>Entra instantaneamente para comprar ou gerir os teus artigos comerciais no ecossistema.</p>
        </div>

        <div class="google-auth-container">
            <div id="buttonDiv"></div>
        </div>

        <div class="footer-notice">
            Acesso seguro gerido pelas políticas oficiais da Google e Supabase Auth.
        </div>
    </div>

    <script>
        // 1. Verificar se já existe sessão ativa ao carregar a página
        async function verificarSessaoAtiva() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session && session.user) {
                redirecionarUsuario(session.user.email);
            }
        }

        // 2. Encaminhar conforme o e-mail
        function redirecionarUsuario(emailUsuario) {
            if (emailUsuario.includes("fornecedor") || emailUsuario.includes("loja")) {
                window.location.href = "painel-fornecedor.html";
            } else {
                window.location.href = "index.html";
            }
        }

        // 3. Capturar o Token nativo da Google e enviar para o Supabase
        async function handleCredentialResponse(response) {
            try {
                const { data, error } = await _supabase.auth.signInWithIdToken({
                    provider: 'google',
                    token: response.credential
                });

                if (error) throw error;

                if (data.user) {
                    redirecionarUsuario(data.user.email);
                }
            } catch (err) {
                console.error("Erro na validação do token:", err);
                alert("Falha na autenticação nativa. Tenta novamente.");
            }
        }

        // 4. Inicializar a API oficial da Google assim que a página estiver pronta
        window.onload = function () {
            verificarSessaoAtiva();

            // Configura o cliente de ID da Google (Usa o Client ID que pegaste na Google Cloud Console)
            // Substitui o texto abaixo pelo teu ID real da Google se o botão não renderizar.
            google.accounts.id.initialize({
                client_id: "781702584102-mockid.apps.googleusercontent.com", 
                callback: handleCredentialResponse
            });

            // Renderiza o botão nativo oficial da Google com o design padrão de mercado
            google.accounts.id.renderButton(
                document.getElementById("buttonDiv"),
                { 
                    theme: "outline", 
                    size: "large", 
                    type: "standard",
                    text: "continue_with",
                    shape: "rectangular",
                    logo_alignment: "left",
                    width: "320" // Largura ideal para telemóveis
                }
            );
            
            // Opcional: Mostra o prompt nativo flutuante "One Tap" no topo do ecrã
            google.accounts.id.prompt(); 
        };
    </script>
</body>
</html>
