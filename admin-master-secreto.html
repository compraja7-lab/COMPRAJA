<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CompraJá - Painel de Controle Admin Master</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://yngxpudkzjkicyokcdwq.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InluZ3hwdWRrempraWN5b2tjZHdxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNjU1NTQsImV4cCI6MjA5NDY0MTU1NH0.2UlNBw8F8HMgWeuyg9IygVFLAfYtW4Pf8j1jGH864gE";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    </script>

    <style>
        :root { --primary-orange: #FF6600; --bg-gray: #F8F9FA; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #1C1C1E; display: flex; justify-content: center; padding: 20px; }
        .smartphone-screen { width: 375px; background: white; border-radius: 16px; overflow: hidden; height: 812px; position: relative; display: flex; flex-direction: column; }
        header { padding: 15px; background: #111; color: #FF6600; text-align: center; }
        header h2 { font-size: 15px; font-weight: bold; }
        .content { padding: 15px; flex: 1; overflow-y: auto; }
        .content::-webkit-scrollbar { display: none; }
        .card-lucro { background: #FFF3EB; border: 1px solid var(--primary-orange); padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 20px; }
        .card-lucro p { font-size: 11px; color: #666; font-weight: bold; }
        .card-lucro h2 { font-size: 24px; color: black; margin-top: 5px; }
        .section-title { font-size: 13px; font-weight: bold; margin-bottom: 10px; color: #333; border-bottom: 1px solid #EEE; padding-bottom: 5px; margin-top: 15px; }
        .pedido-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #EEE; font-size: 12px; }
        .btn-recebido { background: #25D366; color: white; border: none; padding: 6px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; }
        .badge-sucesso { background: #D4EDDA; color: #155724; font-size: 10px; font-weight: bold; padding: 4px 8px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="smartphone-screen">
        <header><h2><i class="fa-solid fa-user-shield"></i> Admin Master Central (CompraJá)</h2></header>
        <div class="content">
            
            <div class="card-lucro">
                <p>O Teu Lucro Acumulado Real (2.000 Kz / Recebido)</p>
                <h2 id="saldo-faturamento">0 Kz</h2>
            </div>

            <div class="section-title">Pedidos Pendentes (Aguardando Recebimento)</div>
            <div id="lista-pedidos-pendentes">
                </div>

            <div class="section-title">Histórico de Pedidos Concluídos</div>
            <div id="lista-pedidos-concluidos">
                </div>
        </div>
    </div>

    <script>
        async function carregarPainelAdmin() {
            const listaPendentes = document.getElementById('lista-pedidos-pendentes');
            const listaConcluidos = document.getElementById('lista-pedidos-concluidos');
            const saldoTxt = document.getElementById('saldo-faturamento');

            try {
                // Puxa todos os pedidos reais do banco de dados
                const { data: pedidos, error } = await _supabase
                    .from('pedidos')
                    .select('*')
                    .order('criado_em', { ascending: false });

                if (error) throw error;

                listaPendentes.innerHTML = '';
                listaConcluidos.innerHTML = '';
                let contagemRecebidos = 0;

                if (!pedidos || pedidos.length === 0) {
                    listaPendentes.innerHTML = '<p style="color:#888; font-size:11px; text-align:center;">Nenhum pedido registado.</p>';
                    listaConcluidos.innerHTML = '<p style="color:#888; font-size:11px; text-align:center;">Nenhum histórico.</p>';
                    saldoTxt.innerText = "0 Kz";
                    return;
                }

                pedidos.forEach(p => {
                    if (p.estado === 'Pendente') {
                        listaPendentes.innerHTML += `
                            <div class="pedido-item">
                                <div>
                                    <b>👤 ${p.cliente_nome}</b><br>
                                    <small>📞 Contacto: ${p.cliente_contacto || 'Não inserido'}</small>
                                </div>
                                <button class="btn-recebido" onclick="marcarComoRecebido('${p.id}')">Recebido</button>
                            </div>
                        `;
                    } else if (p.estado === 'Recebido') {
                        contagemRecebidos++;
                        listaConcluidos.innerHTML += `
                            <div class="pedido-item">
                                <div>
                                    <b>👤 ${p.cliente_nome}</b><br>
                                    <small>Faturado com sucesso</small>
                                </div>
                                <span class="badge-sucesso">+2.000 Kz</span>
                            </div>
                        `;
                    }
                });

                // Calcula o lucro real matemático: 2000 Kz multiplicado pelo número de linhas marcadas como Recebido
                let lucroReal = contagemRecebidos * 2000;
                saldoTxt.innerText = `${lucroReal.toLocaleString()} Kz`;

                if(listaPendentes.innerHTML === '') {
                    listaPendentes.innerHTML = '<p style="color:#888; font-size:11px; text-align:center;">Todos os pedidos foram processados! 🎉</p>';
                }

            } catch (err) {
                console.error(err);
            }
        }

        // Função executada ao clicar no botão "Recebido"
        async function marcarComoRecebido(id) {
            try {
                const { error } = await _supabase
                    .from('pedidos')
                    .update({ estado: 'Recebido' })
                    .eq('id', id);

                if (error) throw error;

                // Atualiza o ecrã na hora mudando o saldo e as listas
                carregarPainelAdmin();

            } catch (err) {
                console.error(err);
                alert("Erro ao atualizar o estado do pedido no Supabase.");
            }
        }

        // Executa a carga dos dados assim que o painel abre
        carregarPainelAdmin();
    </script>
</body>
</html>
